version: '3.8'

services:
  oucab:
    image: oucab:prod
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oucab-app
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      PORT: "3080"
      HOSTNAME: "0.0.0.0"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    # Permite acessar o MySQL do host via host.docker.internal:3306
    # Requer Docker 20.10+; em versões antigas use o IP da bridge: 172.17.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3080',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
